services:
  mysql:
    image: mysql:8.0
    container_name: juice_db
    environment:
      MYSQL_ROOT_PASSWORD: local_password
      MYSQL_DATABASE: juice_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
